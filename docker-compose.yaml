# =============================================================================
# Development stack for the ERP (Laravel 12 + Inertia + React)
#
#   web      -> nginx, serves the app on http://localhost:${APP_PORT:-8000}
#   app      -> php-fpm (also runs first-run setup)
#   queue    -> queue worker (REQUIRED: the app has queued event listeners)
#   scheduler-> runs the Laravel scheduler
#   mysql    -> database
#   redis    -> optional cache / queue / session backend
#   vite     -> Vite dev server with HMR on http://localhost:${VITE_PORT:-5173}
#
# Quick start:
#   cp .env.docker.example .env      (or let the app container do it for you)
#   docker compose up -d --build
#   docker compose exec app php artisan migrate --seed
#   docker compose exec app touch storage/installed
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: erp-app:dev
    container_name: erp_app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      # First-run setup runs only on this container.
      RUN_SETUP: "true"
      AUTO_MIGRATE: ${AUTO_MIGRATE:-false}
      AUTO_SEED: ${AUTO_SEED:-false}
      MARK_INSTALLED: ${MARK_INSTALLED:-false}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
    volumes:
      - .:/var/www/html
      # vendor lives in a fast container-local volume, not the host bind mount
      - vendor:/var/www/html/vendor
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      # Healthy only once php-fpm is actually listening on 9000. start_period
      # covers the first-boot composer install.
      test: ["CMD", "php", "-r", "exit(@fsockopen('127.0.0.1',9000)?0:1);"]
      interval: 5s
      timeout: 3s
      retries: 40
      start_period: 180s
    networks:
      - erp

  web:
    image: nginx:1.27-alpine
    container_name: erp_web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - erp

  queue:
    image: erp-app:dev
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: erp_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    environment:
      RUN_SETUP: "false"
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      - app
      - mysql
    networks:
      - erp

  scheduler:
    image: erp-app:dev
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: erp_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work
    environment:
      RUN_SETUP: "false"
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      - app
      - mysql
    networks:
      - erp

  mysql:
    image: mysql:8.0
    container_name: erp_mysql
    restart: unless-stopped
    ports:
      # Host port 3307 by default to avoid clashing with a local XAMPP/MySQL on
      # 3306. The app connects over the internal network (mysql:3306) regardless.
      - "${DB_FORWARD_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-designvision}
      MYSQL_USER: ${DB_USERNAME:-erp}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      # Use the container's own runtime password (escaped $$ so compose doesn't
      # interpolate it) and a generous start_period for slow first-time init.
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root --password=$$MYSQL_ROOT_PASSWORD --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    networks:
      - erp

  redis:
    image: redis:7-alpine
    container_name: erp_redis
    restart: unless-stopped
    ports:
      - "${REDIS_FORWARD_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - erp

  vite:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    image: erp-vite:dev
    container_name: erp_vite
    restart: unless-stopped
    working_dir: /var/www/html
    command: npm run dev -- --host 0.0.0.0
    environment:
      # Polling makes file-watching reliable on Docker Desktop (Windows/macOS).
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      VITE_DEV_SERVER_HOST: "0.0.0.0"
      VITE_HMR_HOST: ${VITE_HMR_HOST:-localhost}
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - .:/var/www/html
      # Keep node_modules inside the container (Linux binaries differ from the
      # host's, e.g. rollup/esbuild) so the host's node_modules never leaks in.
      - vite-node-modules:/var/www/html/node_modules
      - vendor:/var/www/html/vendor
    networks:
      - erp

networks:
  erp:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  vite-node-modules:
  vendor:
