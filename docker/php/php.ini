; -------------------------------------------------------------------
; ERP development PHP settings
; -------------------------------------------------------------------
memory_limit = 512M

; Media library / document uploads can be large
upload_max_filesize = 128M
post_max_size = 128M
max_file_uploads = 50

max_execution_time = 300
max_input_time = 300
max_input_vars = 5000

; Show errors in development
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

date.timezone = UTC

; OPcache: keep validation on in dev so code changes are picked up immediately,
; but give it enough memory/files for a large Laravel app + Workdo packages and
; only re-check timestamps every couple of seconds instead of every request.
opcache.enable = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 30000

; Cache resolved file paths - a big win when source is on a bind mount, because
; it avoids repeatedly stat-ing every included file's real path.
realpath_cache_size = 8M
realpath_cache_ttl = 600
